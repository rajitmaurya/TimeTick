<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TimeTick Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 id="clock">00:00:00</h1>

  <div class="controls">
    <input type="time" id="alarmTime">
    <button onclick="addAlarm()">Add Alarm</button>
    <button onclick="toggleFormat()">12/24</button>
    <button onclick="toggleSound()">🔊</button>
  </div>

  <ul id="alarmList"></ul>
</div>

<audio id="alarmSound" src="alarm.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
